<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Givo — Signing in...</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #FAFAF7; --ink: #1C1B18; --green: #2A7A5A; --green-light: #E8F4EE; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
img { height: 48px; width: auto; }
.message { font-size: 16px; color: #5A5850; font-weight: 300; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--green-light); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 12px; padding: 16px 24px; font-size: 14px; color: #DC2626; display: none; text-align: center; max-width: 360px; }
</style>
</head>
<body>
<img src="/logo.png" alt="Givo">
<div class="spinner"></div>
<p class="message">Signing you in...</p>
<div class="error" id="error">Something went wrong. <a href="/login.html" style="color:#DC2626;font-weight:600;">Try again →</a></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://jhvlyzhphddripwipkqf.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impodmx5emhwaGRkcmlwd2lwa3FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTYxNjEsImV4cCI6MjA5MDAzMjE2MX0.e-RuMXMvJl-2slblxt2zf97JCGaxCADCj1ubRqbnXJw';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

async function handleCallback() {
  try {
    // Supabase JS client automatically handles the hash/code exchange
    const { data, error } = await supabase.auth.getSession();

    if (error) throw error;

    if (data.session) {
      // Session found — save and redirect
      localStorage.setItem('givo_token', data.session.access_token);
      localStorage.setItem('givo_user', JSON.stringify(data.session.user));
      window.location.href = '/dashboard.html';
      return;
    }

    // No session yet — listen for auth state change
    supabase.auth.onAuthStateChange((event, session) => {
      if (session) {
        localStorage.setItem('givo_token', session.access_token);
        localStorage.setItem('givo_user', JSON.stringify(session.user));
        window.location.href = '/dashboard.html';
      } else if (event === 'SIGNED_OUT') {
        window.location.href = '/login.html';
      }
    });

    // Timeout fallback
    setTimeout(() => {
      document.querySelector('.spinner').style.display = 'none';
      document.querySelector('.message').style.display = 'none';
      document.getElementById('error').style.display = 'block';
    }, 8000);

  } catch (err) {
    console.error('Auth callback error:', err);
    document.querySelector('.spinner').style.display = 'none';
    document.querySelector('.message').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

handleCallback();
</script>
</body>
</html>
